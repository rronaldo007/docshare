{% extends "base.html" %}
{% block title %}Protected link - DocShare{% endblock %}
{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-blue-50 text-blue-600 text-2xl">&#128274;</div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-blue-600 mb-3">Protected share</p>
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight text-slate-900">Password required</h1>
            <p class="mt-3 text-sm text-slate-500 leading-relaxed">
                Enter the password to view the shared {% if link.folder %}folder{% else %}file{% endif %}.
            </p>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl shadow-xl shadow-slate-200/50 p-8">
            <form method="post" action="{% url 'share_view' link.token %}" class="space-y-4">
                {% csrf_token %}
                <input type="password" name="password" placeholder="Password" required autofocus
                       class="w-full border border-slate-300 rounded-xl px-4 py-3 text-sm transition focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500/30">
                <button type="submit"
                        class="w-full bg-blue-600 text-white px-4 py-3 rounded-xl text-sm font-semibold tracking-wide transition hover:bg-blue-700 shadow-lg shadow-blue-600/20">
                    Unlock
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
